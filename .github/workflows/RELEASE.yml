name: release
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: mcserverkit.so
            zip: mcserverkit.linux-x86_64.zip
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            zip: mcserverkit.linux-arm64.zip
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: mcserverkit.dll
            zip: mcserverkit.windows-x86_64.zip
          - os: windows-latest
            goos: windows
            goarch: arm64
            zip: mcserverkit.windows-arm64.zip
          - os: macos-latest
            goos: darwin
            goarch: amd64
            output: mcserverkit.dylib
            zip: mcserverkit.macos-x86_64.zip
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: mcserverkit.dylib
            zip: mcserverkit.macos-arm64.zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: go build -buildmode=c-shared -o ${{ matrix.output }} ./bindings/c
      - if: matrix.goos == 'windows'
        run: |
          gendef ${{ matrix.output }}
          dlltool -d mcserverkit.def -l libmcserverkit.a
      - name: Compress-Archive
        if: matrix.goos == 'windows'
        run: Compress-Archive -Path ${{ matrix.output }}, mcserverkit.h, libmcserverkit.a -DestinationPath ${{ matrix.zip }}
      - name: zip
        if: matrix.goos != 'windows'
        run: zip ${{ matrix.zip }} ${{ matrix.output }} mcserverkit.h
      - name: upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" ${{ matrix.zip }}
